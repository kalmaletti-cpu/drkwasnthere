<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spatium</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#0b0b0b;
    --bg2:#151515;
    --bg3:#1d1d1d;
    --border:#2a2a2a;
    --text:#f2f2f2;
    --text2:#b5b5b5;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:"Figtree",sans-serif; }

body {
    background:var(--bg);
    color:var(--text);
    height:100vh;
    display:flex;
    overflow:hidden;
}

#navbar {
    width:70px;
    background:rgba(20,20,20,0.85);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 0;
    z-index:10;
}

#navbar ul {
    list-style:none;
    width:100%;
    padding:0 10px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

#navbar ul:last-child { margin-top:auto; }

#navbar li {
    width:48px;
    height:48px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    color:var(--text2);
    cursor:pointer;
    transition:0.2s;
    position:relative;
}

#navbar li:hover { background:var(--bg3); color:#fff; }
#navbar li.active { background:#2b2b2b; color:#fff; }

.tooltip {
    position:absolute;
    left:65px;
    background:#111;
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
    opacity:0;
    transform:translateX(-5px);
    transition:0.2s;
    white-space:nowrap;
    border:1px solid var(--border);
}

#navbar li:hover .tooltip {
    opacity:1;
    transform:translateX(0);
}

.container {
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
}

.hometitle {
    font-size:6.5rem;
    font-weight:800;
    letter-spacing:-4px;
}

#splash {
    margin:5px 0 30px;
    color:var(--text2);
}

form {
    display:flex;
    gap:10px;
    width:100%;
    max-width:500px;
}

input {
    flex:1;
    padding:14px;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:10px;
    color:#fff;
    outline:none;
}

select {
    padding:14px;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:10px;
    color:#fff;
}

iframe {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    display:none;
    z-index:5;
    background:#000;
}
</style>
</head>

<body>

<nav id="navbar">
<ul>
<li class="active"><i class="fa-solid fa-house"></i></li>
</ul>
<ul>
<li><i class="fa-solid fa-gamepad"></i></li>
<li><i class="fa-solid fa-globe"></i></li>
<li><i class="fa-solid fa-video"></i></li>
<li><i class="fa-solid fa-music"></i></li>
<li><i class="fa-solid fa-wand-magic-sparkles"></i></li>
</ul>
<ul>
<li><i class="fa-solid fa-user"></i></li>
<li><i class="fa-solid fa-gear"></i></li>
</ul>
</nav>

<div class="container">
<h1 class="hometitle">Spatium</h1>
<p id="splash">loading...</p>

<form id="idk">
<input id="url" type="text" placeholder="Search or enter URL">
<select id="proxysel">
<option value="uv">ultraviolet</option>
<option value="scramjet">scramjet</option>
</select>
</form>

<iframe id="iframe"></iframe>
</div>

<script src="/baremux/index.js" defer></script>
<script src="/uv/uv.bundle.js" defer></script>
<script src="/uv/uv.config.js" defer></script>
<script src="/scram/scramjet.all.js" defer></script>
<script src="/stuff.js" defer></script>

<script>
let splashTexts=["ok","hmm","loading","ready","..."];
document.getElementById("splash").textContent=splashTexts[Math.floor(Math.random()*splashTexts.length)];

document.getElementById("idk").addEventListener("submit",function(e){
e.preventDefault();

let input=document.getElementById("url").value.trim();
let proxy=document.getElementById("proxysel").value;
let frame=document.getElementById("iframe");

if(!input.startsWith("http")) input="https://www.google.com/search?q="+encodeURIComponent(input);

frame.style.display="block";

if(proxy==="uv"){
frame.src="/uv/service/"+__uv$config.encodeUrl(input);
} else {
frame.src="/scram/service/"+input;
}
});
</script>

</body>
</html>
